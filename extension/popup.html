<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>GEO-Chain</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">G</div>
      <div>
        <h1 class="popup-title">GEO-Chain</h1>
        <p class="popup-subtitle">AI Search Visibility</p>
      </div>
    </div>

    <div class="popup-status" id="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>

    <div class="popup-toggle">
      <span class="toggle-label">Enable on four.meme</span>
      <label class="switch">
        <input type="checkbox" id="toggleSwitch" checked>
        <span class="slider"></span>
      </label>
    </div>

    <a class="popup-link" href="https://geo-chain.vercel.app" target="_blank" rel="noopener">
      Open GEO-Chain App &rarr;
    </a>

    <div class="popup-footer">
      <span>v0.1.0 MVP</span>
      <span>&middot;</span>
      <span>Mock Data</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
